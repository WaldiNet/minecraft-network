  service-code-server:
    image: lscr.io/linuxserver/code-server
    container_name: service-code-server
    restart: unless-stopped
    ports:
      - ${SERVICE_VSCODE_PORT:-8443}:8443
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${BASE_TIMEZONE}
      PASSWORD: ${SERVICE_VSCODE_PASSWORD}
      SUDO_PASSWORD: ${SERVICE_VSCODE_SUDO_PASSWORD}
      PROXY_DOMAIN: ${SERVICE_VSCODE_PROXY_DOMAIN}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - ./services/code-server/config:/config
      - ./:/config/workspace
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/visual-studio-code.svg
      com.getarcaneapp.arcane.updater: false

networks:
  mc-proxy:
    driver: bridge
  mc-smp-backup:
    driver: bridge
  mc-expedition-backup:
    driver: bridge
  mc-testing-backup:
    driver: bridge